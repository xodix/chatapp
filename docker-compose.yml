  openAPIDocs:
    image: swaggerapi/swagger-ui
    ports:
      - "5050:8080"
    environment:
      SWAGGER_JSON: /foo/openapi.yaml
    volumes:
      - ./server/docs/openAPI.yml:/foo/openapi.yaml:ro

