components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
        - surname
        - birthdate
      properties:
        email:
          type: string
          format: email
          description: Valid email address
          example: john.doe@example.com
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 32
          description: Password between 8 and 32 characters
          example: securePass1
        name:
          type: string
          minLength: 3
          maxLength: 60
          description: User's first name
          example: John
        surname:
          type: string
          minLength: 3
          maxLength: 60
          description: User's last name
          example: Doe
        birthdate:
          type: string
          format: date-time
          description: Date of birth in RFC 3339 / ISO 8601 format
          example: "1990-06-15T00:00:00Z"

    RegisterResponse:
      type: object
      properties:
        token:
          type: string
          description: Signed JWT for authenticating subsequent requests
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjoxMCwiZXhwIjoxNzgwNTE0MDQxLCJpYXQiOjE3ODA0Mjc2NDF9.yQ1rl4Mkxwvlf5x2yStqy-iVRtkj4NcTNEJ_brhxhRU
        user_id:
          type: integer
          format: uint
          description: Unique ID of the newly created user
          example: 42

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: Valid email address
          example: john.doe@example.com
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 32
          description: Password between 8 and 32 characters
          example: securePass1

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: Signed JWT for authenticating subsequent requests
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjoxMCwiZXhwIjoxNzgwNTE0MDQxLCJpYXQiOjE3ODA0Mjc2NDF9.yQ1rl4Mkxwvlf5x2yStqy-iVRtkj4NcTNEJ_brhxhRU
        user_id:
          type: integer
          format: uint
          description: Unique ID of the newly created user
          example: 42

    DetailsResponse:
      type: object
      properties:
        id:
          type: integer
          format: uint
          description: Unique ID of the user
          example: 42
        email:
          type: string
          description: Users email
          example: john.doe@example.com
        name:
          type: string
          description: Users first name
          example: John
        surname:
          type: string
          description: Users last name
          example: Doe
        birthdate:
          type: string
          format: date-time
          description: Users birthdate as a timestamp

    AttendingResponse:
      type: object
      properties:
        ID:
          type: integer
          format: uint
          description: Unique ID of the user
          example: 1
        CreatedAt:
          type: string
          description: When was record created
          example: 2026-06-05T17:51:34.359+02:00
        UpdatedAt:
          type: string
          description: When was record created
          example: 2026-06-05T17:51:34.359+02:00
        DeletedAt:
          type: string
          description: When was record created
          example: null
          nullable: true
        Year:
          type: integer
          format: uint
          description: What year does the data describe
        StudentsAttending:
          type: number
          format: uint
          description: Average wage in region

    GraduatingResponse:
      type: object
      properties:
        ID:
          type: integer
          format: uint
          description: Unique ID of the user
          example: 1
        CreatedAt:
          type: string
          description: When was record created
          example: 2026-06-05T17:51:34.359+02:00
        UpdatedAt:
          type: string
          description: When was record created
          example: 2026-06-05T17:51:34.359+02:00
        DeletedAt:
          type: string
          description: When was record created
          example: null
          nullable: true
        Year:
          type: integer
          format: uint
          description: What year does the data describe
        StudentsGraduating:
          type: number
          format: uint
          description: Average wage in region

    AverageWageResponse:
      type: object
      properties:
        ID:
          type: integer
          format: uint
          description: Unique ID of the user
          example: 1
        CreatedAt:
