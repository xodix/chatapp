openapi: 3.0.3
info:
  title: User API
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /user/register:
    post:
      summary: Register a new user
      operationId: registerUser
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Validation error — malformed or missing fields
          content:
            text/plain:
              schema:
                type: string
              examples:
                invalid_email:
                  summary: Invalid email format
                  value: "invalid email format"
                parsing_error:
                  summary: Invalid date
                  value: 'code=400, message=Bad Request, err=parsing time "190Z" as "2006-01-02T15:04:05Z07:00": cannot parse "190Z" as "2006"'
                validation_error:
                  summary: Name below minimum length
                  value: "Key: 'RegisterRequest.Email' Error:Field validation for 'Email' failed on the 'email' tag\nKey: 'RegisterRequest.Password' Error:Field validation for 'Password' failed on the 'required' tag\nKey: 'RegisterRequest.Name' Error:Field validation for 'Name' failed on the 'min' tag\nKey: 'RegisterRequest.Surname' Error:Field validation for 'Surname' failed on the 'required' tag"

  /user/login:
    post:
      summary: Login the user
      operationId: loginUser
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Validation error — malformed or missing fields
          content:
            text/plain:
              schema:
                type: string
              examples:
                user_not_found:
                  summary: User does not exist
                  value: "User not found"
                validation_error:
                  summary: Name below minimum length
                  value: "Key: 'RegisterRequest.Email' Error:Field validation for 'Email' failed on the 'email' tag\nKey: 'RegisterRequest.Password' Error:Field validation for 'Password' failed on the 'required' tag\nKey: 'RegisterRequest.Name' Error:Field validation for 'Name' failed on the 'min' tag\nKey: 'RegisterRequest.Surname' Error:Field validation for 'Surname' failed on the 'required' tag"

  /user/:
    get:
      summary: Get the logged in user details
      operationId: userDetails
      tags:
        - User
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailsResponse"
        "404":
          description: No user with id that is inside the token
          content:
            text/plain:
              schema:
                type: string
              examples:
                user_not_found:
                  summary: User does not exist
                  value: "User not found"
        "401":
          description: Invalid token
          content:
            text/plain:
              schema:
                type: string
              example: "Malformed token"

    delete:
      summary: Delete the logged in user
      operationId: deleteUser
      tags:
        - User
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User deleted successfully
          content:
            text/plain:
              schema:
                type: string
              example: "User deleted successfully"
        "404":
          description: No user with id that is inside the token
          content:
            text/plain:
              schema:
                type: string
              examples:
                user_not_found:
                  summary: User does not exist
                  value: "User not found"
        "401":
          description: Invalid token
          content:
            text/plain:
              schema:
                type: string
              example: "Malformed token"

